<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>solace</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #080810;
    overflow: hidden;
    cursor: none;
  }
  #game-container { width: 100vw; height: 100vh; }

  /* Compteur haut-centre */
  #stats-bar {
    position: fixed;
    top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 28px;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: #c8b89a; opacity: 0;
    pointer-events: none; user-select: none;
    z-index: 10;
    transition: opacity 1.2s;
  }
  #stats-bar.ready { opacity: 0.5; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .stat-val { font-size: 15px; letter-spacing: 1px; color: #e8d8b8; }
  .stat-lbl { font-size: 9px; letter-spacing: 3px; opacity: 0.65; }

  /* Tooltip plante */
  #plant-tip {
    position: fixed;
    pointer-events: none; user-select: none;
    z-index: 20;
    opacity: 0; transition: opacity 0.25s;
    background: rgba(8,8,16,0.82);
    border: 1px solid rgba(200,184,154,0.2);
    padding: 9px 13px;
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 1.5px; line-height: 1.7;
    color: #c8b89a;
    max-width: 200px;
  }
  #plant-tip.show { opacity: 1; }
  #plant-tip .tip-country { font-size: 12px; color: #e8d8b8; letter-spacing: 2px; margin-bottom: 4px; }
  #plant-tip .tip-type   { opacity: 0.7; }
  #plant-tip .tip-water  { margin-top: 5px; }
  #plant-tip .water-bar  {
    display: inline-block; width: 80px; height: 2px;
    background: rgba(200,184,154,0.15); vertical-align: middle;
    margin-left: 6px; position: relative;
  }
  #plant-tip .water-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: #7ab8d4; transition: width 0.4s;
  }

  /* Wordmark */
  #wordmark {
    position: fixed; bottom: 18px; left: 22px;
    font-family: 'Courier New', monospace; font-size: 13px;
    letter-spacing: 4px; color: #c8b89a; opacity: 0.55;
    pointer-events: none; user-select: none; z-index: 10;
  }
  #connection-state {
    position: fixed; top: 10px; right: 14px;
    width: 6px; height: 6px; border-radius: 50%;
    background: #2d4a2d; z-index: 10; transition: background 1s;
  }
  #connection-state.live { background: #3a5c3a; }
</style>
</head>
<body>
<div id="game-container"></div>

<!-- Compteur -->
<div id="stats-bar">
  <div class="stat"><span class="stat-val" id="s-lives">—</span><span class="stat-lbl">VIES</span></div>
  <div class="stat"><span class="stat-val" id="s-alive">—</span><span class="stat-lbl">VIVANTES</span></div>
  <div class="stat"><span class="stat-val" id="s-countries">—</span><span class="stat-lbl">PAYS</span></div>
  <div class="stat"><span class="stat-val" id="s-watered">0</span><span class="stat-lbl">ARROSÉES</span></div>
</div>

<!-- Tooltip -->
<div id="plant-tip">
  <div class="tip-country" id="tip-country"></div>
  <div class="tip-type"    id="tip-type"></div>
  <div class="tip-water">
    eau
    <span class="water-bar"><span class="water-fill" id="tip-wfill"></span></span>
  </div>
</div>

<div id="wordmark">solace</div>
<div id="connection-state"></div>

<script>
  window.onerror = function(msg, url, line, col, err) {
    console.error('[solace] uncaught', msg, 'line=' + line, err);
  };

  // Compteur — chargé une fois puis mis à jour par WS
  let wateredCount = 0;
  function loadStats() {
    fetch('/api/stats').then(r => r.json()).then(d => {
      document.getElementById('s-lives').textContent     = d.total;
      document.getElementById('s-alive').textContent     = d.alive;
      document.getElementById('s-countries').textContent = d.countries;
      document.getElementById('stats-bar').classList.add('ready');
    }).catch(() => {});
  }
  loadStats();

  // Incrémenter arrosage quand un plant_watered arrive
  window._onPlantWatered = function() {
    wateredCount++;
    document.getElementById('s-watered').textContent = wateredCount;
  };

  // Tooltip
  const tip = document.getElementById('plant-tip');
  const COUNTRY_NAMES = {
    PSE: 'Gaza / Palestine', SDN: 'Soudan', UKR: 'Ukraine',
    MMR: 'Myanmar', YEM: 'Yémen'
  };
  const VICTIM_LABELS = {
    civilian: 'civil·e', combatant: 'combattant·e'
  };

  window.showPlantTip = function(plant, px, py) {
    if (!plant) { tip.classList.remove('show'); return; }
    document.getElementById('tip-country').textContent =
      COUNTRY_NAMES[plant.country_code] || plant.country_code;
    document.getElementById('tip-type').textContent =
      VICTIM_LABELS[plant.victim_type] || plant.victim_type;
    const pct = Math.round((plant.water_level || 0));
    document.getElementById('tip-wfill').style.width = pct + '%';

    // Positionner : décale pour rester dans l'écran
    const tw = 200, th = 80;
    const x = (px + 16 + tw > window.innerWidth)  ? px - tw - 8 : px + 16;
    const y = (py + th     > window.innerHeight)   ? py - th     : py + 4;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
    tip.classList.add('show');
  };
  window.hidePlantTip = function() { tip.classList.remove('show'); };
</script>

<script src="/phaser.min.js"></script>
<script src="/js/plantRenderer.js"></script>
<script src="/js/propRenderer.js"></script>
<script src="/js/botRenderer.js"></script>
<script src="/js/gardenScene.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
